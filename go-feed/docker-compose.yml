services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - feedsim
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  feedsim:
    build: .
    expose:
      - "8100"
    environment:
      - FEED_PORT=8100
      - FEED_HOST=0.0.0.0
      - FEED_SEED=0
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/feedsim?sslmode=disable
      - SEND_BUFFER=4096
      - ARCHIVE_DIR=/data/archive
      - ARCHIVE_MAX_GB=4
      - ARCHIVE_INTERVAL_HOURS=6
      - ARCHIVE_AFTER_HOURS=24
      - GOMEMLIMIT=450MiB
    volumes:
      - archivedata:/data/archive
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=feedsim
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=20"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feedsim"]
      interval: 3s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 400M
    restart: unless-stopped

volumes:
  pgdata:
  archivedata:
  caddy_data:
  caddy_config:
